<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>عوالم — قبيلتك (جماعي)</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<!-- Firebase SDK — يُحمل مسبقاً -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06060f;--bg2:#0c0c1e;--card:#111128;--card2:#161635;
  --border:rgba(255,255,255,0.06);--text:#f0eeff;--muted:#5a5878;
  --g1:#ff6b1a;--g2:#ff9500;--g3:#ffcc44;--ember:#ff3300;--gold:#ffd700;
  --voice:#2ed573;--voice-off:#ff4757;
}
html,body{height:100%;overflow:hidden;font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text)}

/* ===== Login System ===== */
.login-overlay{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1.2rem}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:2.2rem 2rem;width:420px;max-width:90vw;text-align:center;box-shadow:0 24px 70px rgba(0,0,0,.7);transition:all .3s}
.login-box h2{font-size:1.3rem;font-weight:900;margin-bottom:.4rem;background:linear-gradient(135deg,var(--g1),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-box p{font-size:.75rem;color:var(--muted);margin-bottom:1.5rem}
.login-inp{width:100%;background:rgba(255,255,255,.04);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:.9rem;padding:.7rem 1rem;outline:none;transition:all .3s;margin-bottom:.8rem;text-align:center}
.login-inp:focus{border-color:rgba(255,107,26,.4);background:rgba(255,107,26,.06);box-shadow:0 0 16px rgba(255,107,26,.1)}
.login-inp::placeholder{color:rgba(255,255,255,.12)}
.login-btn{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;font-size:.9rem;font-weight:800;font-family:'Tajawal',sans-serif;cursor:pointer;box-shadow:0 0 20px rgba(255,107,26,.35);transition:all .25s;margin-top:.5rem}
.login-btn:hover{transform:translateY(-2px);box-shadow:0 0 32px rgba(255,107,26,.55)}
.login-error{display:none;background:rgba(255,71,87,.12);border:1px solid rgba(255,71,87,.3);border-radius:10px;padding:.6rem .9rem;font-size:.72rem;color:#ff4757;margin-bottom:.8rem;text-align:right}
.login-small{font-size:.65rem;color:var(--muted);margin-top:1rem}

/* ===== Chat System (WhatsApp/Snapchat style) ===== */
.chat-msgs { display:flex; flex-direction:column; gap:10px; padding:12px 14px; overflow-y:auto; flex:1; }
.chat-msgs::-webkit-scrollbar { width:4px; }
.chat-msgs::-webkit-scrollbar-thumb { background:rgba(255,255,255,.08); border-radius:100px; }
.message { max-width:78%; padding:8px 12px; border-radius:16px; position:relative; word-wrap:break-word; display:flex; flex-direction:column; gap:4px; animation:msgIn .25s ease; }
@keyframes msgIn { from { opacity:0; transform:translateY(8px) scale(.96); } to { opacity:1; transform:translateY(0) scale(1); } }
.message.sent { align-self:flex-end; background:linear-gradient(135deg,var(--g1),var(--g2)); color:#000; border-bottom-right-radius:3px; }
.message.received { align-self:flex-start; background:var(--card2); color:var(--text); border-bottom-left-radius:3px; border:1px solid var(--border); }
.message-sender { font-size:11px; font-weight:800; margin-bottom:2px; opacity:.75; letter-spacing:.3px; }
.message.sent .message-sender { color:rgba(0,0,0,.55); }
.message.received .message-sender { color:var(--muted); }
.message-text { font-size:13px; line-height:1.45; word-break:break-word; }
.message-time { font-size:10px; opacity:.6; margin-top:2px; display:block; text-align:left; }
.message-image { max-width:240px; max-height:280px; border-radius:10px; cursor:pointer; display:block; object-fit:cover; transition:transform .2s; }
.message-image:hover { transform:scale(1.02); }
.message-video { max-width:240px; max-height:220px; border-radius:10px; display:block; background:#000; object-fit:cover; }
.download-btn { display:inline-flex; align-items:center; gap:5px; background:rgba(0,0,0,.15); color:inherit; border:none; padding:5px 10px; border-radius:20px; cursor:pointer; font-size:11px; margin-top:4px; transition:all .2s; text-decoration:none; width:fit-content; font-family:'Tajawal',sans-serif; }
.message.received .download-btn { background:rgba(255,255,255,.06); color:var(--text); border:1px solid var(--border); }
.message.sent .download-btn { background:rgba(0,0,0,.12); color:#000; }
.download-btn:hover { background:rgba(0,0,0,.25); transform:translateY(-1px); }
.message.received .download-btn:hover { background:rgba(255,255,255,.12); }
.media-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:10000; align-items:center; justify-content:center; flex-direction:column; backdrop-filter:blur(8px); }
.media-modal.active { display:flex; }
.modal-content { max-width:92%; max-height:82%; position:relative; display:flex; align-items:center; justify-content:center; }
.modal-content img, .modal-content video { max-width:100%; max-height:72vh; border-radius:10px; box-shadow:0 20px 60px rgba(0,0,0,.8); }
.modal-close { position:absolute; top:-48px; right:0; background:none; border:none; color:#fff; font-size:28px; cursor:pointer; width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:50%; transition:background .2s; }
.modal-close:hover { background:rgba(255,255,255,.1); }
.modal-download { margin-top:18px; background:linear-gradient(135deg,var(--g1),var(--g2)); color:#000; border:none; padding:10px 28px; border-radius:25px; font-size:15px; font-weight:900; cursor:pointer; display:flex; align-items:center; gap:8px; font-family:'Tajawal',sans-serif; box-shadow:0 4px 20px rgba(255,107,26,.4); transition:transform .2s; }
.modal-download:hover { transform:translateY(-2px); }
.empty-chat { text-align:center; padding:2.5rem 1rem; color:var(--muted); font-size:.8rem; display:flex; flex-direction:column; align-items:center; gap:.6rem; }

/* ===== App Layout ===== */
.app{display:grid;grid-template-columns:64px 1fr 300px;grid-template-rows:100vh;height:100vh;position:relative;z-index:1}
.sidebar{grid-column:1!important;grid-row:1!important;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:.8rem 0;gap:.4rem;z-index:10}
.main{grid-column:2!important;grid-row:1!important;display:flex;flex-direction:column;overflow:hidden;position:relative}
.panel{grid-column:3!important;grid-row:1!important;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;z-index:10}

/* Sidebar */
.sb-logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--ember),var(--g2));display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:1rem;cursor:pointer;box-shadow:0 0 20px rgba(255,107,26,.4);transition:transform .2s}
.sb-logo:hover{transform:scale(1.08)}
.sb-btn{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--muted);cursor:pointer;transition:all .25s;position:relative}
.sb-btn:hover{background:rgba(255,255,255,.04);color:var(--text)}
.sb-btn.on{background:rgba(255,107,26,.12);color:var(--g1);box-shadow:0 0 12px rgba(255,107,26,.2)}
.sb-badge{position:absolute;top:4px;right:4px;width:14px;height:14px;border-radius:50%;background:var(--ember);font-size:.5rem;font-family:'Space Mono',monospace;color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg2)}
.sb-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:.4rem}
.sb-av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#7c3aff,#ec4899);display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:800;cursor:pointer;box-shadow:0 0 12px rgba(124,58,255,.35);border:2px solid rgba(124,58,255,.3);transition:transform .2s;overflow:hidden}
.sb-av:hover{transform:scale(1.1)}
.sb-av img{width:100%;height:100%;object-fit:cover}

/* Main */
.topbar{height:60px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;border-bottom:1px solid var(--border);background:rgba(6,6,15,.85);backdrop-filter:blur(20px);z-index:20}
.tribe-name{font-size:1rem;font-weight:900;background:linear-gradient(135deg,var(--g1),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:8px}
.tb-btn{height:32px;padding:0 14px;border-radius:100px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--muted);font-size:.75rem;font-family:'Tajawal',sans-serif;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px}
.tb-btn:hover{color:var(--text);background:rgba(255,255,255,.07)}

/* Scene */
.scene{flex:1;position:relative;overflow:hidden;transition:background 1.8s ease;background:radial-gradient(ellipse at 50% 100%,#1a0800 0%,#0a0005 45%,#06060f 100%)}
.fire-zone{position:absolute;left:50%;bottom:24%;transform:translateX(-50%);z-index:5;display:flex;flex-direction:column;align-items:center}
.flame{border-radius:50% 50% 40% 40%/60% 60% 40% 40%;transform-origin:bottom center;position:absolute;bottom:0;left:50%;transition:height 1.3s ease,width 1s ease}
.fl-o{width:92px;height:132px;background:linear-gradient(to top,rgba(255,50,0,.92),rgba(255,120,0,.72),rgba(255,200,0,.22),transparent);transform:translateX(-50%);filter:blur(3.5px);animation:fd 1.4s ease-in-out infinite}
.fl-m{width:62px;height:102px;background:linear-gradient(to top,rgba(255,80,0,1),rgba(255,160,0,.88),rgba(255,220,50,.32),transparent);transform:translateX(-50%);filter:blur(1.5px);animation:fd 1.1s .15s ease-in-out infinite}
.fl-i{width:38px;height:78px;background:linear-gradient(to top,rgba(255,255,200,1),rgba(255,220,80,.92),rgba(255,160,0,.42),transparent);transform:translateX(-50%);filter:blur(.5px);animation:fd .85s .3s ease-in-out infinite}
.fl-c{width:17px;height:48px;background:linear-gradient(to top,#fff,#fffacc,rgba(255,240,100,0));transform:translateX(-50%);animation:fd .6s .1s ease-in-out infinite}
@keyframes fd{0%{transform:translateX(-50%) scaleX(1) scaleY(1) rotate(-1deg)}25%{transform:translateX(-50%) scaleX(.91) scaleY(1.07) rotate(1.5deg)}50%{transform:translateX(-50%) scaleX(1.08) scaleY(.96) rotate(-2deg)}75%{transform:translateX(-50%) scaleX(.94) scaleY(1.1) rotate(1deg)}100%{transform:translateX(-50%) scaleX(1) scaleY(1) rotate(-1deg)}}
.logs{width:112px;height:24px;background:linear-gradient(to bottom,#4a2800,#2d1800);border-radius:14px;position:absolute;bottom:0;box-shadow:0 4px 16px rgba(0,0,0,.6),0 0 28px rgba(255,80,0,.4)}
.coal-glow{width:96px;height:16px;background:radial-gradient(ellipse,rgba(255,110,0,.95) 0%,rgba(255,50,0,.65) 40%,transparent 70%);border-radius:50%;position:absolute;bottom:10px;filter:blur(2px);animation:coalB 1.5s ease-in-out infinite}
@keyframes coalB{0%,100%{opacity:.65}50%{opacity:1}}
.ground{position:absolute;bottom:0;left:0;right:0;height:25%;background:linear-gradient(to top,#0f1a0a,#0a1008 60%,transparent);z-index:1}

/* Panel */
.panel-tribe{padding:1rem;border-bottom:1px solid var(--border);background:linear-gradient(135deg,rgba(255,107,26,.06),rgba(255,150,0,.02))}
.pt-name{font-size:.95rem;font-weight:900}
.pt-stats{display:flex;gap:.5rem;margin-top:.8rem}
.pts{flex:1;text-align:center;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:.4rem}
.pts-v{font-size:.85rem;font-weight:800;color:var(--g2)}
.panel-tabs{display:flex;border-bottom:1px solid var(--border);padding:0 1rem}
.p-tab{flex:1;text-align:center;padding:.5rem 0;font-size:.7rem;color:var(--muted);cursor:pointer;transition:all .2s;border-bottom:2px solid transparent}
.p-tab:hover{color:var(--text)}
.p-tab.on{color:var(--g2);border-bottom-color:var(--g2)}
.panel-body{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.panel-section{flex:1;display:flex;flex-direction:column;overflow:hidden;display:none}
.panel-section.on{display:flex}

/* Chat Input */
.chat-inp-row{padding:.5rem .7rem;border-top:1px solid var(--border);display:flex;gap:5px;align-items:center}
.chat-inp{flex:1;background:rgba(255,255,255,.03);border:1.5px solid var(--border);border-radius:100px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:.78rem;padding:.45rem .75rem;outline:none;transition:all .3s}
.chat-inp:focus{border-color:rgba(255,107,26,.3);background:rgba(255,107,26,.05)}
.chat-send{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--ember),var(--g2));border:none;color:#fff;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(255,107,26,.4);transition:transform .2s;flex-shrink:0}
.chat-send:hover{transform:scale(1.1)}
.chat-attach,.chat-voice{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}

/* Toast */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-20px);background:rgba(10,8,20,.96);border:1px solid rgba(255,107,26,.25);color:var(--g2);padding:8px 22px;border-radius:100px;font-size:.72rem;font-family:'Space Mono',monospace;z-index:9999;transition:all .3s;pointer-events:none;white-space:nowrap;opacity:0;box-shadow:0 8px 30px rgba(0,0,0,.5)}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}

@media(max-width:768px){
  .app{display:flex!important;flex-direction:column!important;height:100svh!important;width:100vw!important;grid-template-columns:none!important;grid-template-rows:none!important;overflow:hidden!important}
  .sidebar{order:99!important;flex-direction:row!important;height:52px!important;width:100%!important;min-height:52px!important;border-left:none!important;border-top:1px solid var(--border)!important;padding:0 .4rem!important;gap:.1rem!important;justify-content:space-around!important;align-items:center!important;background:var(--card2)!important;overflow-x:auto!important;flex-shrink:0!important}
  .main{order:1!important;flex-shrink:0!important;height:148px!important;min-height:148px!important;max-height:148px!important;position:relative!important;overflow:hidden!important}
  .panel{order:2!important;flex:1!important;min-height:0!important;border-right:none!important;border-top:1px solid var(--border)!important;background:var(--card)!important;overflow:hidden!important}
  .message{max-width:85%;padding:7px 10px;border-radius:14px}
  .message-image{max-width:180px;max-height:200px}
  .message-video{max-width:180px;max-height:160px}
  .login-box{padding:1.2rem .9rem!important;width:90vw!important}
}
</style>
</head>
<body>

<!-- Login Overlay -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box" id="modeBox">
    <div style="font-size:2.5rem;margin-bottom:.3rem;animation:fd 2s ease-in-out infinite">🔥</div>
    <h2>عوالم</h2>
    <p>قبيلتك. عالمك. تحدّاك.</p>
    <button onclick="showAuthBox()" style="width:100%;padding:.75rem;border:none;border-radius:12px;background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;font-family:Tajawal,sans-serif;font-weight:800;font-size:.9rem;cursor:pointer;margin-bottom:.6rem;box-shadow:0 0 20px rgba(255,107,26,.35)">
      🔐 دخول بحساب
    </button>
    <button onclick="enterAsGuest()" style="width:100%;padding:.75rem;border:1.5px solid var(--border);border-radius:12px;background:rgba(255,255,255,.04);color:var(--text);font-family:Tajawal,sans-serif;font-weight:700;font-size:.85rem;cursor:pointer">
      👤 دخول سريع كضيف
    </button>
    <div class="login-small">الدخول كضيف يتيح لك تجربة اللعبة فوراً بدون تسجيل حساب</div>
  </div>

  <div class="login-box" id="authBox" style="display:none">
    <div style="display:flex;gap:.5rem;margin-bottom:1.2rem;background:var(--card2);border-radius:12px;padding:4px">
      <button id="tabLogin" onclick="switchAuthTab('login')" style="flex:1;padding:.45rem;border:none;border-radius:9px;background:linear-gradient(135deg,var(--g1),var(--g2));color:#fff;font-family:Tajawal,sans-serif;font-weight:700;font-size:.82rem;cursor:pointer">دخول</button>
      <button id="tabRegister" onclick="switchAuthTab('register')" style="flex:1;padding:.45rem;border:none;border-radius:9px;background:transparent;color:var(--muted);font-family:Tajawal,sans-serif;font-weight:700;font-size:.82rem;cursor:pointer">حساب جديد</button>
    </div>
    <div id="nameField" style="display:none"><input class="login-inp" id="loginName" placeholder="اسمك في اللعبة"></div>
    <input class="login-inp" id="loginEmail" placeholder="البريد الإلكتروني" type="email">
    <div style="position:relative">
      <input class="login-inp" id="loginPass" placeholder="كلمة المرور" type="password" style="padding-left:2.5rem">
      <span onclick="togglePassVis()" style="position:absolute;left:.7rem;top:50%;transform:translateY(-50%);cursor:pointer;font-size:.9rem;opacity:.5">👁</span>
    </div>
    <div id="confirmField" style="display:none"><input class="login-inp" id="loginPassConfirm" placeholder="تأكيد كلمة المرور" type="password"></div>
    <div class="login-error" id="authError"></div>
    <button class="login-btn" id="authBtn" onclick="doAuth()">🚀 دخول</button>
    <div id="forgotWrap" style="margin-top:.6rem"><span onclick="doForgotPassword()" style="font-size:.7rem;color:var(--muted);cursor:pointer;text-decoration:underline;opacity:.7">نسيت كلمة المرور؟</span></div>
    <div style="display:flex;align-items:center;gap:.5rem;margin:.8rem 0">
      <div style="flex:1;height:1px;background:var(--border)"></div><span style="font-size:.65rem;color:var(--muted)">أو</span><div style="flex:1;height:1px;background:var(--border)"></div>
    </div>
    <button onclick="doGoogleLogin()" style="width:100%;padding:.6rem;border:1.5px solid var(--border);border-radius:12px;background:rgba(255,255,255,.04);color:var(--text);font-family:Tajawal,sans-serif;font-weight:700;font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.5rem">
      <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      دخول بـ Google
    </button>
    <div style="margin-top:.8rem"><span onclick="backToMode()" style="font-size:.7rem;color:var(--muted);cursor:pointer">← رجوع</span></div>
  </div>
</div>

<!-- Media Modal -->
<div class="media-modal" id="mediaModal" onclick="closeMediaModal(event)">
  <button class="modal-close" onclick="closeMediaModal()">✕</button>
  <div class="modal-content" id="modalContent"></div>
  <button class="modal-download" id="modalDownload" onclick="downloadCurrentMedia()">⬇️ تحميل</button>
</div>

<div class="app">
<aside class="sidebar">
  <div class="sb-logo" id="tribeLogoBtn" onclick="toggleTribeMenu()" title="تبديل القبيلة">🔥</div>
  <div class="sb-btn on" data-panel="chat" onclick="switchPanel('chat', this)">🌍</div>
  <div class="sb-btn" data-panel="challenge" onclick="switchPanel('challenge', this)">⚔️</div>
  <div class="sb-btn" data-panel="members" onclick="switchPanel('members', this)">👥</div>
  <div class="sb-btn" data-panel="trophy" onclick="switchPanel('trophy', this)">🏆</div>
  <div class="sb-bottom">
    <div class="sb-btn" onclick="openSettings()">⚙️</div>
    <div class="sb-av" onclick="openMyProfile()"><img id="myAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=سامي" alt="أنا"></div>
  </div>
</aside>

<main class="main">
  <div class="topbar">

<div id="toast"></div>

<script>
// ===== Firebase Config =====
const FB_CONFIG = {
  apiKey: "AIzaSyB7dxh49AS3EMjU_IbkPyJInX1Fe7DsaPA",
  authDomain: "awalem-game.firebaseapp.com",
  databaseURL: "https://awalem-game-default-rtdb.firebaseio.com",
  projectId: "awalem-game",
  storageBucket: "awalem-game.firebasestorage.app",
  messagingSenderId: "34905451178",
  appId: "1:34905451178:web:3367593469105f728afed3",
  measurementId: "G-06G9EDR6E3"
};

// ===== State =====
let currentUser = null;
let pendingUser = null;
let authMode = 'login';
let myProfile = { name: 'سامي', email: '', bio: 'لاعب شغوف', avatar: '' };
let fuel = 68;
let currentTribe = 0;

// ===== Firebase Check =====
let _firebaseReady = false;
function checkFirebase() {
  if (typeof firebase !== 'undefined' && firebase.auth && firebase.database) {
    if (!firebase.apps.length) {
      try { firebase.initializeApp(FB_CONFIG); } catch(e){}
    }
    _firebaseReady = true;
    return true;
  }
  return false;
}

function waitForFirebase(ms = 5000) {
  return new Promise(resolve => {
    if (checkFirebase()) { resolve(true); return; }
    let tries = 0;
    const iv = setInterval(() => {
      tries++;
      if (checkFirebase()) { clearInterval(iv); resolve(true); }
      else if (tries > ms/100) { clearInterval(iv); resolve(false); }
    }, 100);
  });
}

// ===== UI Functions =====
function showAuthBox() {
  document.getElementById('modeBox').style.display = 'none';
  document.getElementById('authBox').style.display = 'block';
}

function backToMode() {
  document.getElementById('authBox').style.display = 'none';
  document.getElementById('modeBox').style.display = 'block';
}

function switchAuthTab(mode) {
  authMode = mode;
  const isReg = mode === 'register';
  document.getElementById('nameField').style.display = isReg ? 'block' : 'none';
  document.getElementById('confirmField').style.display = isReg ? 'block' : 'none';
  document.getElementById('forgotWrap').style.display = isReg ? 'none' : 'block';
  document.getElementById('authBtn').textContent = isReg ? '✨ إنشاء حساب' : '🚀 دخول';
  document.getElementById('tabLogin').style.background = isReg ? 'transparent' : 'linear-gradient(135deg,#ff6b1a,#ff9500)';
  document.getElementById('tabLogin').style.color = isReg ? '#5a5878' : '#fff';
  document.getElementById('tabRegister').style.background = isReg ? 'linear-gradient(135deg,#ff6b1a,#ff9500)' : 'transparent';
  document.getElementById('tabRegister').style.color = isReg ? '#fff' : '#5a5878';
  showAuthError('');
}

function showAuthError(msg) {
  const el = document.getElementById('authError');
  if (msg) { el.textContent = msg; el.style.display = 'block'; }
  else { el.style.display = 'none'; }
}

function togglePassVis() {
  const p = document.getElementById('loginPass');
  p.type = p.type === 'password' ? 'text' : 'password';
}

function _authErrMsg(code) {
  const msgs = {
    'auth/user-not-found': 'البريد غير مسجل',
    'auth/wrong-password': 'كلمة المرور خاطئة',
    'auth/email-already-in-use': 'البريد مسجّل',
    'auth/weak-password': 'كلمة المرور ضعيفة',
    'auth/invalid-email': 'صيغة البريد غير صحيحة',
    'auth/too-many-requests': 'محاولات كثيرة',
    'auth/network-request-failed': 'خطأ في الاتصال',
    'auth/configuration-not-found': 'Firebase Auth غير مفعّل في Console',
    'auth/unauthorized-domain': 'النطاق غير مصرح به — أضفه في Firebase Console',
    'auth/popup-blocked': 'المتصفح حظر النافذة',
    'auth/popup-closed-by-user': 'أُغلقت النافذة',
  };
  return msgs[code] || 'خطأ: ' + code;
}

// ===== GUEST LOGIN (Works Always) =====
function enterAsGuest() {
  try {
    const id = Math.floor(Math.random() * 9999) + 1;
    const name = 'ضيف_' + id;
    const uid = 'guest_' + Date.now();

    myProfile.name = name;
    myProfile.avatar = 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + encodeURIComponent(name);

    document.getElementById('myAvatar').src = myProfile.avatar;
    document.getElementById('setDispName') && (document.getElementById('setDispName').textContent = name);
    document.getElementById('myProfName') && (document.getElementById('myProfName').textContent = name);
    document.getElementById('editName') && (document.getElementById('editName').value = name);

    document.getElementById('loginOverlay').style.display = 'none';
    toast('👤 مرحباً ' + name + '!');

    console.log('✅ Guest login:', name, uid);
  } catch(e) {
    console.error('Guest error:', e);
    alert('خطأ: ' + e.message);
  }
}

// ===== EMAIL AUTH =====
async function doAuth() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const btn = document.getElementById('authBtn');

  if (!email || !email.includes('@')) { showAuthError('❌ أدخل بريداً صالحاً'); return; }
  if (!pass || pass.length < 6) { showAuthError('❌ كلمة المرور 6 أحرف'); return; }

  btn.textContent = '⏳...'; btn.disabled = true;
  showAuthError('');

  const ready = await waitForFirebase(8000);
  if (!ready) {
    btn.textContent = authMode === 'register' ? '✨ إنشاء' : '🚀 دخول';
    btn.disabled = false;
    showAuthError('❌ Firebase غير متاح — جرب الضيف');
    return;
  }

  try {
    const auth = firebase.auth();
    if (authMode === 'register') {
      const name = document.getElementById('loginName').value.trim();
      const conf = document.getElementById('loginPassConfirm').value;
      if (!name) { showAuthError('❌ أدخل اسمك'); btn.textContent='✨ إنشاء'; btn.disabled=false; return; }
      if (pass !== conf) { showAuthError('❌ كلمتا المرور غير متطابقتين'); btn.textContent='✨ إنشاء'; btn.disabled=false; return; }
      const cred = await auth.createUserWithEmailAndPassword(email, pass);
      await cred.user.updateProfile({ displayName: name });
      currentUser = cred.user;
      pendingUser = { uid: cred.user.uid, name, email };
      document.getElementById('authBox').style.display = 'none';
      document.getElementById('tribeBox').style.display = 'block';
    } else {
      const cred = await auth.signInWithEmailAndPassword(email, pass);
      currentUser = cred.user;
      const name = cred.user.displayName || email.split('@')[0];
      pendingUser = { uid: cred.user.uid, name, email };
      document.getElementById('loginOverlay').style.display = 'none';
      toast('🎮 مرحباً ' + name + '!');
    }
  } catch(e) {
    btn.textContent = authMode === 'register' ? '✨ إنشاء' : '🚀 دخول';
    btn.disabled = false;
    showAuthError(_authErrMsg(e.code));
    console.error('Auth error:', e);
  }
}

// ===== GOOGLE AUTH =====
async function doGoogleLogin() {
  const ready = await waitForFirebase(5000);
  if (!ready) { showAuthError('❌ Firebase غير متاح'); return; }

  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.addScope('profile');
    provider.addScope('email');

    let cred;
    try {
      cred = await firebase.auth().signInWithPopup(provider);
    } catch(popupErr) {
      if (popupErr.code === 'auth/popup-blocked') {
        showAuthError('🔄 جاري التحويل...');
        await firebase.auth().signInWithRedirect(provider);
        return;
      }
      throw popupErr;
    }

    const user = cred.user;
    const name = user.displayName || user.email.split('@')[0];
    currentUser = user;
    pendingUser = { uid: user.uid, name, email: user.email };
    document.getElementById('loginOverlay').style.display = 'none';
    toast('🎮 مرحباً ' + name + '!');
  } catch(e) {
    showAuthError(_authErrMsg(e.code));
    console.error('Google error:', e);
  }
}

// ===== FORGOT PASSWORD =====
async function doForgotPassword() {
  const email = document.getElementById('loginEmail').value.trim();
  if (!email || !email.includes('@')) { showAuthError('❌ أدخل بريدك'); return; }
  const ready = await waitForFirebase(3000);
  if (!ready) { showAuthError('❌ Firebase غير متاح'); return; }
  try {
    await firebase.auth().sendPasswordResetEmail(email);
    showAuthError('');
    toast('📧 تم إرسال رابط الاستعادة!');
  } catch(e) { showAuthError(_authErrMsg(e.code)); }
}

// ===== CHAT SYSTEM =====
function chat(id, txt, bg, name, mediaHTML, isRemote) {
  const msgs = document.getElementById('chatMsgs');
  const empty = document.getElementById('emptyChatState');
  if (empty) empty.style.display = 'none';

  const d = document.createElement('div');
  d.className = 'message ' + (isRemote ? 'received' : 'sent');
  let html = '';
  if (isRemote) html += '<div class="message-sender">' + name + '</div>';
  html += '<div class="message-text">' + txt + '</div>';
  if (mediaHTML) html += mediaHTML;
  html += '<span class="message-time">' + new Date().toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit'}) + '</span>';
  d.innerHTML = html;
  msgs.appendChild(d);
  msgs.scrollTop = msgs.scrollHeight;
}

function sendMsg() {
  const inp = document.getElementById('chatI');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = '';
  chat('أ', txt, '', myProfile.name || 'أنت', '', false);
}

function handleMedia(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const url = e.target.result;
    const filename = file.name || 'media';
    let mediaHTML = '';
    if (file.type.startsWith('image/')) {
      mediaHTML = '<img src="' + url + '" class="message-image" onclick="openMediaModal('' + url + '', 'image', '' + filename + '')" alt="صورة">' +
        '<a href="' + url + '" download="' + filename + '" class="download-btn" onclick="event.stopPropagation()">⬇️ تحميل</a>';
    } else if (file.type.startsWith('video/')) {
      mediaHTML = '<video src="' + url + '" class="message-video" controls></video>' +
        '<a href="' + url + '" download="' + filename + '" class="download-btn" onclick="event.stopPropagation()">⬇️ تحميل</a>';
    }
    chat('أ', '📎 مرفق', '', myProfile.name || 'أنت', mediaHTML, false);
    toast('📎 تم الإرسال');
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ===== MEDIA MODAL =====
let currentMediaUrl = null, currentMediaType = null, currentMediaFilename = null;
function openMediaModal(url, type, filename) {
  currentMediaUrl = url; currentMediaType = type; currentMediaFilename = filename;
  const modal = document.getElementById('mediaModal');
  const content = document.getElementById('modalContent');
  content.innerHTML = type === 'image' ? '<img src="' + url + '" alt="معاينة">' : '<video controls autoplay><source src="' + url + '" type="video/mp4"></video>';
  modal.classList.add('active');
}
function closeMediaModal(e) { if (e && e.target !== e.currentTarget) return; document.getElementById('mediaModal').classList.remove('active'); }
function downloadCurrentMedia() {
  if (!currentMediaUrl) return;
  const a = document.createElement('a');
  a.href = currentMediaUrl; a.download = currentMediaFilename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

// ===== PANEL SWITCHING =====
function switchPanel(panelName, el) {
  document.querySelectorAll('.panel-section').forEach(s => s.classList.remove('on'));
  document.getElementById('panel-' + panelName).classList.add('on');
  document.querySelectorAll('.p-tab').forEach(t => t.classList.remove('on'));
  if (el) el.classList.add('on');
  document.querySelectorAll('.sb-btn[data-panel]').forEach(b => { b.classList.toggle('on', b.dataset.panel === panelName); });
}

// ===== TOAST =====
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== OTHER FUNCTIONS =====
function toggleChatVoice() { toast('🎤 صوت'); }
function toggleChal() { toast('⚔️ تحدي'); }
function toggleNotifications() { toast('🔔 إشعارات'); }
function toggleTribeMenu() { toast('🏕️ قبائل'); }
function openSettings() { toast('⚙️ إعدادات'); }
function openMyProfile() { toast('👤 الملف'); }

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  console.log('🚀 Page loaded');
  checkFirebase();
});
</script>
